<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的網站</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 48px;
      text-align: center;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    h1 { font-size: 2rem; color: #333; margin-bottom: 12px; }
    p { color: #666; margin-bottom: 24px; }
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    .features { display: flex; gap: 16px; margin-top: 24px; }
    .feature { flex: 1; padding: 16px; background: #f5f5f5; border-radius: 8px; }
    .feature h3 { font-size: 0.9rem; color: #444; }
  </style>
</head>
<body>
  <div class="card">
    <h1>歡迎來到我的網站</h1>
    <p>這是一個使用純 HTML + CSS 建立的簡單網頁</p>
    <button>開始探索</button>
    <div class="features">
      <div class="feature"><h3>🎨 美觀設計</h3></div>
      <div class="feature"><h3>📱 響應式佈局</h3></div>
      <div class="feature"><h3>⚡ 輕量快速</h3></div>
    </div>
  </div>
</body>
</html>
